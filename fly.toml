# Fly.io configuration
# Deploy:  fly deploy --ha=false
# First time:  ./scripts/fly-setup.sh

app = "fairshare-app"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  DATABASE_URL = "sqlite:///./data/fairshare.db"
  SEED_DEMO = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "10s"

[mounts]
  source = "fairshare_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
