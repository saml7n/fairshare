# fairshare — parbaked configuration.
#
# Every PARBAKED_* env var also works here as a toml key.
# Full list: https://github.com/saml7n/parbaked/blob/main/AGENTS.md
# ──────────────────────────────────────────────────────────────────────────

app_name = "fairshare"

# Same SQLite file as the previous fairshare build, so existing rows survive.
database_url = "sqlite:///./fairshare.db"

# Match the previous fairshare invite-gate cadence (5 signups/hr, 20 logins/hr).
ratelimit_signup = "5/hour"
ratelimit_login = "20/hour"

[frontend]
# Pre-built React bundle. The build step runs locally (``npm run build``
# in ../web) before each deploy and copies dist/ → server/web/. We
# don't use the multi-stage Docker build because the React source lives
# outside the build context (monorepo, see parbaked issue #121).
source_dir = "web"

fly_region = "lhr"
fly_max_machines = 2
