services:
  fairshare:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - fairshare-data:/app/data
    env_file:
      - .env.local
    environment:
      # DB lives on the named volume so it survives rebuilds
      DATABASE_URL: sqlite:////app/data/fairshare.db
      # Never seed demo data in production
      SEED_DEMO: "false"
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Exposes the app publicly via an ngrok tunnel.
  # Get a free authtoken + static domain at https://dashboard.ngrok.com
  # Set NGROK_AUTHTOKEN and optionally NGROK_DOMAIN in .env.local
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: >
      http fairshare:8080
      ${NGROK_DOMAIN:+--domain=${NGROK_DOMAIN}}
    env_file:
      - .env.local
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 128
    ports:
      - "4040:4040"  # ngrok web UI — visit http://localhost:4040 to see your public URL
    depends_on:
      fairshare:
        condition: service_healthy

volumes:
  fairshare-data:

